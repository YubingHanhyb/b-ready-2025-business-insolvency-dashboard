<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B-READY 2025 — Business Insolvency Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#FFFFFF;--bg2:#F8FAFC;--bg3:#F1F5F9;--border:#E2E8F0;--text:#1E293B;--text2:#475569;--text3:#94A3B8;--p1:#059669;--p1bg:rgba(5,150,105,.1);--p2:#D97706;--p2bg:rgba(217,119,6,.1);--p3:#1D4ED8;--p3bg:rgba(29,78,216,.12);--accent:#1E40AF;--hi:#3B82F6;--lo:#DC2626;--white:#FFFFFF}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1440px;margin:0 auto;padding:16px 20px}
.hdr{display:flex;align-items:flex-end;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.hdr h1{font-size:22px;font-weight:700;letter-spacing:-.5px}
.hdr h1 span{color:var(--accent)}
.hdr .sub{font-size:12px;color:var(--text3);margin-bottom:2px}
.badge{background:var(--bg3);border:1px solid var(--border);padding:2px 10px;border-radius:20px;font-size:11px;color:var(--text2);font-weight:500}
.tabs{display:flex;gap:3px;margin-bottom:16px;background:var(--bg2);padding:3px;border-radius:10px;border:1px solid var(--border);overflow-x:auto}
.tab{padding:7px 14px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text3);border:none;background:none;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--text)}
.tab.on{background:var(--accent);color:#fff}
.frow{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:flex-end}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:600}
.fg select,.fg input{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:7px;font-size:12px;font-family:inherit;min-width:150px}
.fg select:focus,.fg input:focus{outline:none;border-color:var(--accent)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px}
.card .cl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.card .cv{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace}
.card .cd{font-size:10px;color:var(--text3);margin-top:2px}
.card.p1{border-left:3px solid var(--p1)}.card.p2{border-left:3px solid var(--p2)}.card.p3{border-left:3px solid var(--p3)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
@media(max-width:900px){.g2,.g3{grid-template-columns:1fr}}
.cb{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.cb h3{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text2)}
.cw{position:relative;height:300px}.cw.tall{height:420px}.cw.xtall{height:520px}.cw.sm{height:220px}
.tw{overflow-x:auto;background:var(--bg2);border:1px solid var(--border);border-radius:10px}
.st{max-height:560px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{position:sticky;top:0;background:var(--bg3);padding:8px 10px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);cursor:pointer;white-space:nowrap;border-bottom:1px solid var(--border);z-index:2}
th:hover{color:var(--accent)}
td{padding:6px 10px;border-bottom:1px solid #F1F5F9;white-space:nowrap}
tr:hover td{background:rgba(37,99,235,.04)}
.sa{font-size:9px;margin-left:3px}
.sb{display:flex;align-items:center;gap:6px}
.sb .br{height:5px;border-radius:3px;background:#E2E8F0;width:70px;overflow:hidden}
.sb .br .fl{height:100%;border-radius:3px}
.sb .nm{font-family:'JetBrains Mono',monospace;font-size:11px;min-width:34px}
.pl{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500}
.pl-r{background:rgba(30,64,175,.1);color:var(--accent)}
.pl-i{background:rgba(180,83,9,.1);color:#92400E}
/* Profile */
.ph{display:flex;gap:20px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.ph h2{font-size:20px;font-weight:700}
.ps{font-size:44px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--accent)}
.pbars{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.pb{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.pb .pl2{font-size:10px;color:var(--text3);margin-bottom:4px}
.pb .pv{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace}
.pb.b1{border-top:3px solid var(--p1)}.pb.b1 .pv{color:var(--p1)}
.pb.b2{border-top:3px solid var(--p2)}.pb.b2 .pv{color:var(--p2)}
.pb.b3{border-top:3px solid var(--p3)}.pb.b3 .pv{color:var(--p3)}
/* Compare */
.cpanel{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:14px}
.ccard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px}
.ccard h3{font-size:14px;font-weight:700;margin-bottom:3px}
.ccard .cm{font-size:10px;color:var(--text3);margin-bottom:12px}
.crow{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #F1F5F9}
.crow .rl{font-size:11px;color:var(--text2)}.crow .rv{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600}
.esel{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:flex-end}
a.elink{color:var(--accent);text-decoration:none;font-weight:500}
a.elink:hover{text-decoration:underline}
</style>
</head>

function avg(arr){if(!arr.length)return 0;return arr.reduce((a,b)=>a+b,0)/arr.length}
function med(arr){if(!arr.length)return 0;const s=[...arr].sort((a,b)=>a-b);const m=Math.floor(s.length/2);return s.length%2?s[m]:(s[m-1]+s[m])/2}
function fmt1(v){return v!=null?v.toFixed(1):'-'}
function fmt2(v){return v!=null?v.toFixed(2):'-'}
function scolor(v){return v>=75?'#047857':v>=50?'#B45309':'#B91C1C'}
function trunc(s,n){return s&&s.length>n?s.slice(0,n-1)+'…':s}

function sbar(val,color){
  const c=color||scolor(val||0);
  return `<div class="sb"><div class="nm" style="color:${c}">${fmt1(val)}</div><div class="br"><div class="fl" style="width:${Math.min(val||0,100)}%;background:${c}"></div></div></div>`;
}

let CH={};
function destroyCH(){Object.values(CH).forEach(c=>{try{c.destroy()}catch(e){}});CH={}}
const GRID={color:'rgba(0,0,0,.06)'};
const TICK={color:'#64748B',font:{size:10}};

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function render(){
  destroyCH();
  const f=filt();
  let h='';

  h+=`<div class="hdr">
    <div>
      <h1>B-READY 2025 — <span>Business Insolvency</span></h1>
      <div class="sub">Interactive Data Explorer · ${DATA.length} Economies · 3 Pillars · 9 Categories · 105 Indicators</div>
    </div>
    <span class="badge">${f.length} shown</span>
  </div>`;

  const TABS=[{id:'overview',l:'Overview'},{id:'rankings',l:'Rankings'},{id:'indicators',l:'Indicator Explorer'},{id:'profile',l:'Economy Profile'},{id:'compare',l:'Compare'},{id:'scatter',l:'Scatter Plot'}];
  h+=`<div class="tabs">${TABS.map(t=>`<button class="tab ${S.tab===t.id?'on':''}" onclick="ss({tab:'${t.id}'})">${t.l}</button>`).join('')}</div>`;

  h+=`<div class="frow">
    <div class="fg"><label>Region</label><select onchange="ss({region:this.value})">
      <option value="All">All Regions</option>
      ${REGIONS_ALL.map(r=>`<option ${S.region===r?'selected':''}>${r}</option>`).join('')}
    </select></div>
    <div class="fg"><label>Income Group</label><select onchange="ss({income:this.value})">
      <option value="All">All Income Groups</option>
      ${INCOMES_ALL.map(i=>`<option ${S.income===i?'selected':''}>${i}</option>`).join('')}
    </select></div>
    <div class="fg"><label>Search Economy</label><input type="text" placeholder="Economy name…" value="${S.search}" oninput="ss({search:this.value})"></div>
  </div>`;

  if(S.tab==='overview')   h+=rOverview(f);
  else if(S.tab==='rankings')   h+=rRankings(f);
  else if(S.tab==='indicators') h+=rIndicators(f);
  else if(S.tab==='profile')    h+=rProfile(f);
  else if(S.tab==='compare')    h+=rCompare();
  else if(S.tab==='scatter')    h+=rScatter(f);

  document.getElementById('app').innerHTML=h;
  requestAnimationFrame(()=>{
    if(S.tab==='overview')   iOverview(f);
    else if(S.tab==='indicators') iIndicators(f);
    else if(S.tab==='profile')    iProfile();
    else if(S.tab==='compare')    iCompare();
    else if(S.tab==='scatter')    iScatter(f);
  });
}

function rOverview(f){
  const a=k=>fmt1(avg(f.map(d=>d[k]).filter(v=>v!=null)));
  const sorted=f.slice().sort((a,b)=>(b.ov||0)-(a.ov||0));
  const top=sorted[0], bot=sorted[sorted.length-1];

  let h=`<div class="cards">
    <div class="card"><div class="cl">Avg Overall</div><div class="cv">${a('ov')}</div><div class="cd">${f.length} economies shown</div></div>
    <div class="card p1"><div class="cl">Avg Pillar 1</div><div class="cv" style="color:var(--p1)">${a('p1')}</div><div class="cd">Quality of Regulations</div></div>
    <div class="card p2"><div class="cl">Avg Pillar 2</div><div class="cv" style="color:var(--p2)">${a('p2')}</div><div class="cd">Institutional Infrastructure</div></div>
    <div class="card p3"><div class="cl">Avg Pillar 3</div><div class="cv" style="color:var(--p3)">${a('p3')}</div><div class="cd">Operational Efficiency</div></div>
    <div class="card"><div class="cl">Highest</div><div class="cv" style="font-size:15px">${top?top.n:'-'}</div><div class="cd">${top?fmt1(top.ov):'-'}/100</div></div>
    <div class="card"><div class="cl">Lowest</div><div class="cv" style="font-size:15px">${bot?bot.n:'-'}</div><div class="cd">${bot?fmt1(bot.ov):'-'}/100</div></div>
  </div>`;

  h+=`<div class="g2">
    <div class="cb"><h3>Overall Score Distribution</h3><div class="cw sm"><canvas id="ch_dist"></canvas></div></div>
    <div class="cb"><h3>Pillar Averages by Region</h3><div class="cw sm"><canvas id="ch_regP"></canvas></div></div>
  </div>`;
  h+=`<div class="g2">
    <div class="cb"><h3>Pillar Averages by Income Group</h3><div class="cw sm"><canvas id="ch_incP"></canvas></div></div>
    <div class="cb"><h3>Pillar 1 vs Pillar 2 (Overall)</h3><div class="cw sm"><canvas id="ch_p1p2"></canvas></div></div>
  </div>`;
  h+=`<div class="cb" style="margin-bottom:14px"><h3>Average Category Scores</h3><div class="cw sm"><canvas id="ch_cat"></canvas></div></div>`;
  h+=`<div class="g2">
    <div class="cb"><h3>Category Scores by Region</h3><div class="cw tall"><canvas id="ch_catReg"></canvas></div></div>
    <div class="cb"><h3>Category Scores by Income Group</h3><div class="cw tall"><canvas id="ch_catInc"></canvas></div></div>
  </div>`;
  return h;
}

function iOverview(f){
  // Distribution
  const bins=Array(10).fill(0);
  f.forEach(d=>{const b=Math.min(Math.floor((d.ov||0)/10),9);bins[b]++});
  CH.dist=new Chart(document.getElementById('ch_dist'),{
    type:'bar',
    data:{labels:bins.map((_,i)=>`${i*10}–${i*10+10}`),datasets:[{data:bins,backgroundColor:'rgba(29,78,216,.65)',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:GRID,ticks:TICK},y:{grid:GRID,ticks:{...TICK,stepSize:1}}}}
  });

  // Region pillars
  const regsP=REGIONS_ALL.filter(r=>f.some(d=>d.r===r));
  const rP1=regsP.map(r=>{const rd=f.filter(d=>d.r===r);return avg(rd.map(d=>d.p1))});
  const rP2=regsP.map(r=>{const rd=f.filter(d=>d.r===r);return avg(rd.map(d=>d.p2))});
  const rP3=regsP.map(r=>{const rd=f.filter(d=>d.r===r);return avg(rd.map(d=>d.p3))});
  CH.regP=new Chart(document.getElementById('ch_regP'),{
    type:'bar',
    data:{labels:regsP.map(r=>trunc(r,20)),datasets:[
      {label:'P1',data:rP1.map(v=>v.toFixed(1)),backgroundColor:'rgba(5,150,105,.7)'},
      {label:'P2',data:rP2.map(v=>v.toFixed(1)),backgroundColor:'rgba(217,119,6,.7)'},
      {label:'P3',data:rP3.map(v=>v.toFixed(1)),backgroundColor:'rgba(29,78,216,.7)'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
      plugins:{legend:{labels:{color:'#64748B',font:{size:10}}}},
      scales:{x:{max:100,grid:GRID,ticks:TICK},y:{grid:{display:false},ticks:{...TICK,font:{size:9}}}}}
  });

  // Income pillars
  const incsP=INCOMES_ALL.filter(inc=>f.some(d=>d.inc===inc));
  const iP1=incsP.map(inc=>{const id=f.filter(d=>d.inc===inc);return avg(id.map(d=>d.p1))});
  const iP2=incsP.map(inc=>{const id=f.filter(d=>d.inc===inc);return avg(id.map(d=>d.p2))});
  const iP3=incsP.map(inc=>{const id=f.filter(d=>d.inc===inc);return avg(id.map(d=>d.p3))});
  CH.incP=new Chart(document.getElementById('ch_incP'),{
    type:'bar',
    data:{labels:incsP,datasets:[
      {label:'P1',data:iP1.map(v=>v.toFixed(1)),backgroundColor:'rgba(5,150,105,.7)'},
      {label:'P2',data:iP2.map(v=>v.toFixed(1)),backgroundColor:'rgba(217,119,6,.7)'},
      {label:'P3',data:iP3.map(v=>v.toFixed(1)),backgroundColor:'rgba(29,78,216,.7)'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#64748B',font:{size:10}}}},
      scales:{x:{grid:{display:false},ticks:TICK},y:{max:100,grid:GRID,ticks:TICK}}}
  });

  // Pillar 1 vs 2 scatter
  CH.p1p2=new Chart(document.getElementById('ch_p1p2'),{
    type:'scatter',
    data:{datasets:[{
      data:f.map(d=>({x:d.p1||0,y:d.p2||0,label:d.n})),
      backgroundColor:'rgba(29,78,216,.6)',pointRadius:4,pointHoverRadius:7
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.raw.label}: P1=${fmt1(ctx.raw.x)}, P2=${fmt1(ctx.raw.y)}`}}},
      scales:{x:{title:{display:true,text:'Pillar 1',color:'#64748B'},grid:GRID,ticks:TICK},y:{title:{display:true,text:'Pillar 2',color:'#64748B'},grid:GRID,ticks:TICK}}}
  });

  // Category averages
  const catAvg=CAT_KEYS.map(i=>avg(f.map(d=>d[`c${i}`]).filter(v=>v!=null)));
  const catColors=CAT_KEYS.map(i=>P_COLOR[CAT_PILLAR[i]]+'BB');
  const catLabels=CATS_META.map(c=>trunc(c.replace(/^\d+\.\d+\. /,''),22));
  CH.cat=new Chart(document.getElementById('ch_cat'),{
    type:'bar',
    data:{labels:catLabels,datasets:[{data:catAvg.map(v=>v.toFixed(1)),backgroundColor:catColors,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{...TICK,maxRotation:40,font:{size:9}}},y:{grid:GRID,ticks:TICK}}}
  });

  // Category by region
  const regsC=REGIONS_ALL.filter(r=>f.some(d=>d.r===r));
  CH.catReg=new Chart(document.getElementById('ch_catReg'),{
    type:'bar',
    data:{labels:catLabels,datasets:regsC.map((r,ri)=>{
      const rd=f.filter(d=>d.r===r);
      return{label:trunc(r,20),data:CAT_KEYS.map(i=>avg(rd.map(d=>d[`c${i}`]).filter(v=>v!=null)).toFixed(1)),backgroundColor:PALETTE7[ri%7]+'BB',borderColor:PALETTE7[ri%7],borderWidth:1,borderRadius:2};
    })},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#64748B',font:{size:9}},position:'bottom'}},scales:{x:{grid:{display:false},ticks:{...TICK,font:{size:8},maxRotation:45}},y:{grid:GRID,ticks:TICK}}}
  });

  // Category by income
  const incsC=INCOMES_ALL.filter(inc=>f.some(d=>d.inc===inc));
  CH.catInc=new Chart(document.getElementById('ch_catInc'),{
    type:'bar',
    data:{labels:catLabels,datasets:incsC.map((inc,ii)=>{
      const id=f.filter(d=>d.inc===inc);
      return{label:inc,data:CAT_KEYS.map(i=>avg(id.map(d=>d[`c${i}`]).filter(v=>v!=null)).toFixed(1)),backgroundColor:INC_COLORS[ii%4]+'BB',borderColor:INC_COLORS[ii%4],borderWidth:1,borderRadius:2};
    })},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#64748B',font:{size:9}},position:'bottom'}},scales:{x:{grid:{display:false},ticks:{...TICK,font:{size:8},maxRotation:45}},y:{grid:GRID,ticks:TICK}}}
  });
}

// ══════════════════════════════════════════
// RANKINGS
// ══════════════════════════════════════════
function rRankings(f){
  const textCols=['n','r','inc'];
  const sorted=f.slice().sort((a,b)=>{
    const c=S.sortCol;
    if(textCols.includes(c)){const r=(a[c]||'').localeCompare(b[c]||'');return S.sortDir==='desc'?-r:r}
    return S.sortDir==='desc'?(b[c]||0)-(a[c]||0):(a[c]||0)-(b[c]||0);
  });
  const ar=c=>S.sortCol===c?(S.sortDir==='desc'?'▼':'▲'):'';

  const cols=[
    {k:'n',l:'Economy'},{k:'r',l:'Region'},{k:'inc',l:'Income'},{k:'rk',l:'Rank'},
    {k:'ov',l:'Overall'},
    {k:'p1',l:'Pillar 1'},{k:'p2',l:'Pillar 2'},{k:'p3',l:'Pillar 3'},
    ...CAT_KEYS.map(i=>({k:`c${i}`,l:trunc(CATS_META[i].replace(/^\d+\.\d+\. /,''),18)}))
  ];

  let h=`<div class="tw"><div class="st"><table><thead><tr>`;
  cols.forEach(c=>{h+=`<th onclick="tsort('${c.k}')">${c.l}<span class="sa">${ar(c.k)}</span></th>`});
  h+=`</tr></thead><tbody>`;

  sorted.forEach(d=>{
    h+=`<tr>`;
    h+=`<td><a class="elink" href="#" onclick="event.preventDefault();ss({tab:'profile',profile:'${d.n.replace(/'/g,"\\'")}'})">${d.n}</a></td>`;
    h+=`<td><span class="pl pl-r">${trunc(d.r||'-',20)}</span></td>`;
    h+=`<td><span class="pl pl-i">${d.inc||'-'}</span></td>`;
    h+=`<td style="font-family:'JetBrains Mono',monospace;font-weight:600">#${d.rk}</td>`;
    h+=`<td>${sbar(d.ov)}</td>`;
    h+=`<td>${sbar(d.p1,P_COLOR[1])}</td>`;
    h+=`<td>${sbar(d.p2,P_COLOR[2])}</td>`;
    h+=`<td>${sbar(d.p3,P_COLOR[3])}</td>`;
    CAT_KEYS.forEach(i=>{h+=`<td>${sbar(d[`c${i}`],P_COLOR[CAT_PILLAR[i]])}</td>`});
    h+=`</tr>`;
  });
  h+=`</tbody></table></div></div>`;
  return h;
}

// ══════════════════════════════════════════
// INDICATOR EXPLORER
// ══════════════════════════════════════════
function getIndsForCat(catIdx){
  // Return array of {key, name} for indicators in this category
  return Object.entries(IND_TO_CAT)
    .filter(([k,v])=>v===catIdx)
    .map(([k])=>({key:k, name:INDS_META[parseInt(k.slice(1))]}));
}

function rIndicators(f){
  const catLabels=CATS_META.map((c,i)=>`[P${CAT_PILLAR[i]}] ${c}`);
  const indsInCat=getIndsForCat(S.indCat);

  let h=`<div class="frow">
    <div class="fg" style="flex:1;min-width:280px"><label>Category</label>
      <select onchange="ss({indCat:parseInt(this.value),indIdx:0})" style="min-width:320px">
        ${CATS_META.map((c,i)=>`<option value="${i}" ${S.indCat===i?'selected':''}>[P${CAT_PILLAR[i]}] ${c}</option>`).join('')}
      </select>
    </div>
    <div class="fg" style="flex:1;min-width:280px"><label>Indicator</label>
      <select onchange="ss({indIdx:parseInt(this.value)})" style="min-width:320px">
        ${indsInCat.map((ind,idx)=>`<option value="${idx}" ${S.indIdx===idx?'selected':''}>${trunc(ind.name,70)}</option>`).join('')}
      </select>
    </div>
  </div>`;

  if(!indsInCat.length){h+='<p style="color:var(--text3)">No indicators in this category.</p>';return h}

  const selInd=indsInCat[Math.min(S.indIdx,indsInCat.length-1)];
  const vals=f.map(d=>({n:d.n,r:d.r,inc:d.inc,v:d[selInd.key]})).filter(x=>x.v!=null).sort((a,b)=>b.v-a.v);
  const allVals=vals.map(x=>x.v);

  // Summary cards
  h+=`<div class="cards">
    <div class="card" style="border-left:3px solid ${P_COLOR[CAT_PILLAR[S.indCat]]}">
      <div class="cl">Indicator</div>
      <div class="cv" style="font-size:14px;font-family:'DM Sans',sans-serif;color:${P_COLOR[CAT_PILLAR[S.indCat]]}">${trunc(selInd.name,60)}</div>
      <div class="cd">Category: ${CATS_META[S.indCat]}</div>
    </div>
    <div class="card"><div class="cl">Mean</div><div class="cv">${fmt2(avg(allVals))}</div><div class="cd">${vals.length} economies</div></div>
    <div class="card"><div class="cl">Median</div><div class="cv">${fmt2(med(allVals))}</div></div>
    <div class="card"><div class="cl">Min</div><div class="cv" style="color:var(--lo)">${fmt2(allVals.length?Math.min(...allVals):null)}</div></div>
    <div class="card"><div class="cl">Max</div><div class="cv" style="color:var(--p1)">${fmt2(allVals.length?Math.max(...allVals):null)}</div></div>
  </div>`;

  // Charts
  h+=`<div class="g2">
    <div class="cb"><h3>Avg Score by Region</h3><div class="cw"><canvas id="ch_indReg"></canvas></div></div>
    <div class="cb"><h3>Avg Score by Income Group</h3><div class="cw"><canvas id="ch_indInc"></canvas></div></div>
  </div>`;

  // Ranked bar (top 40 for readability)
  const top40=vals.slice(0,40);
  h+=`<div class="cb" style="margin-bottom:14px"><h3>Economy Rankings — ${selInd.name}</h3>
    <div class="cw" style="height:${Math.max(280,top40.length*18+60)}px"><canvas id="ch_indBar"></canvas></div>
  </div>`;

  // Table
  const textCols=['n','r','inc'];
  const sortedT=f.slice().sort((a,b)=>{
    const c=S.sortCol;
    if(textCols.includes(c)){const r=(a[c]||'').localeCompare(b[c]||'');return S.sortDir==='desc'?-r:r}
    if(c===selInd.key) return S.sortDir==='desc'?(b[c]||0)-(a[c]||0):(a[c]||0)-(b[c]||0);
    return S.sortDir==='desc'?(b[c]||0)-(a[c]||0):(a[c]||0)-(b[c]||0);
  });
  const ar2=c=>S.sortCol===c?(S.sortDir==='desc'?'▼':'▲'):'';

  h+=`<div class="tw"><div class="st"><table><thead><tr>
    <th onclick="tsort('n')">Economy<span class="sa">${ar2('n')}</span></th>
    <th onclick="tsort('r')">Region<span class="sa">${ar2('r')}</span></th>
    <th onclick="tsort('inc')">Income<span class="sa">${ar2('inc')}</span></th>
    <th onclick="tsort('${selInd.key}')">Score<span class="sa">${ar2(selInd.key)}</span></th>
  </tr></thead><tbody>`;
  sortedT.forEach(d=>{
    const v=d[selInd.key];
    h+=`<tr>
      <td><a class="elink" href="#" onclick="event.preventDefault();ss({tab:'profile',profile:'${d.n.replace(/'/g,"\\'")}'})">${d.n}</a></td>
      <td><span class="pl pl-r">${trunc(d.r||'',20)}</span></td>
      <td><span class="pl pl-i">${d.inc||''}</span></td>
      <td style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:${v!=null?P_COLOR[CAT_PILLAR[S.indCat]]:'var(--text3)'}">${v!=null?fmt2(v):'-'}</td>
    </tr>`;
  });
  h+=`</tbody></table></div></div>`;
  return h;
}

function iIndicators(f){
  const indsInCat=getIndsForCat(S.indCat);
  if(!indsInCat.length) return;
  const selInd=indsInCat[Math.min(S.indIdx,indsInCat.length-1)];
  const col=P_COLOR[CAT_PILLAR[S.indCat]];

  // Region bar
  const regsP=REGIONS_ALL.filter(r=>f.some(d=>d.r===r));
  const rAvgs=regsP.map(r=>{const rd=f.filter(d=>d.r===r);return avg(rd.map(d=>d[selInd.key]).filter(v=>v!=null))});
  const rCounts=regsP.map(r=>f.filter(d=>d.r===r).length);
  CH.indReg=new Chart(document.getElementById('ch_indReg'),{
    type:'bar',
    data:{labels:regsP.map(r=>trunc(r,20)),datasets:[{data:rAvgs.map(v=>v.toFixed(2)),backgroundColor:col+'CC',borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{afterLabel:ctx=>`n = ${rCounts[ctx.dataIndex]}`}}},scales:{x:{grid:{display:false},ticks:{...TICK,font:{size:9}}},y:{grid:GRID,ticks:TICK}}}
  });

  // Income bar
  const incsP=INCOMES_ALL.filter(inc=>f.some(d=>d.inc===inc));
  const iAvgs=incsP.map(inc=>{const id=f.filter(d=>d.inc===inc);return avg(id.map(d=>d[selInd.key]).filter(v=>v!=null))});
  const iCounts=incsP.map(inc=>f.filter(d=>d.inc===inc).length);
  CH.indInc=new Chart(document.getElementById('ch_indInc'),{
    type:'bar',
    data:{labels:incsP,datasets:[{data:iAvgs.map(v=>v.toFixed(2)),backgroundColor:INC_COLORS.slice(0,incsP.length).map(c=>c+'99'),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{afterLabel:ctx=>`n = ${iCounts[ctx.dataIndex]}`}}},scales:{x:{grid:{display:false},ticks:TICK},y:{grid:GRID,ticks:TICK}}}
  });

  // Horizontal bar - top 40
  const top40=f.map(d=>({n:d.n,v:d[selInd.key]})).filter(x=>x.v!=null).sort((a,b)=>b.v-a.v).slice(0,40);
  CH.indBar=new Chart(document.getElementById('ch_indBar'),{
    type:'bar',
    data:{labels:top40.map(x=>x.n),datasets:[{data:top40.map(x=>x.v),backgroundColor:col+'CC',borderRadius:2}]},
    options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,grid:GRID,ticks:TICK},y:{grid:{display:false},ticks:{...TICK,font:{size:9}}}}}
  });
}

// ══════════════════════════════════════════
// ECONOMY PROFILE
// ══════════════════════════════════════════
function rProfile(f){
  let h=`<div class="fg" style="margin-bottom:14px"><label>Select Economy</label>
    <select onchange="ss({profile:this.value})">
      ${DATA.slice().sort((a,b)=>a.n.localeCompare(b.n)).map(d=>`<option ${S.profile===d.n?'selected':''}>${d.n}</option>`).join('')}
    </select>
  </div>`;

  const eco=DATA.find(d=>d.n===S.profile);
  if(!eco){return h+'<p style="color:var(--text3)">Economy not found.</p>'}

  // Global rank
  const gr=DATA.slice().sort((a,b)=>(b.ov||0)-(a.ov||0)).findIndex(d=>d.n===eco.n)+1;
  const rp=DATA.filter(d=>d.r===eco.r).sort((a,b)=>(b.ov||0)-(a.ov||0));
  const rr=rp.findIndex(d=>d.n===eco.n)+1;

  h+=`<div class="ph">
    <div class="ps">${fmt1(eco.ov)}</div>
    <div>
      <h2>${eco.n}</h2>
      <div style="display:flex;gap:6px;margin-top:3px">
        <span class="pl pl-r">${eco.r||'—'}</span>
        <span class="pl pl-i">${eco.inc||'—'}</span>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-top:4px">
        Global rank: <b style="color:var(--text)">#${gr}</b>/${DATA.length} &nbsp;·&nbsp; Regional rank: <b style="color:var(--text)">#${rr}</b>/${rp.length}
      </div>
    </div>
  </div>`;

  h+=`<div class="pbars">
    <div class="pb b1"><div class="pl2">Pillar 1 — Quality of Regulations</div><div class="pv">${fmt1(eco.p1)}</div></div>
    <div class="pb b2"><div class="pl2">Pillar 2 — Institutional Infrastructure</div><div class="pv">${fmt1(eco.p2)}</div></div>
    <div class="pb b3"><div class="pl2">Pillar 3 — Operational Efficiency</div><div class="pv">${fmt1(eco.p3)}</div></div>
  </div>`;

  h+=`<div class="g2">
    <div class="cb"><h3>Category Radar vs Global Mean</h3><div class="cw"><canvas id="ch_profRadar"></canvas></div></div>
    <div class="cb"><h3>Category Scores</h3>
      ${CAT_KEYS.map(i=>`<div class="crow">
        <span class="rl">${trunc(CATS_META[i].replace(/^\d+\.\d+\. /,''),35)}</span>
        ${sbar(eco[`c${i}`],P_COLOR[CAT_PILLAR[i]])}
      </div>`).join('')}
    </div>
  </div>`;

  // Similar economies
  const similar=DATA.filter(d=>d.n!==eco.n)
    .map(d=>({...d,diff:Math.abs((d.ov||0)-(eco.ov||0))}))
    .sort((a,b)=>a.diff-b.diff).slice(0,5);

  h+=`<div class="cb" style="margin-bottom:14px"><h3>Similar Economies (by Overall Score)</h3>
    <div class="tw"><table><thead><tr>
      <th>Economy</th><th>Region</th><th>Income</th>
      <th>Overall</th><th>Pillar 1</th><th>Pillar 2</th><th>Pillar 3</th>
    </tr></thead><tbody>`;
  similar.forEach(d=>{
    h+=`<tr>
      <td><a class="elink" href="#" onclick="event.preventDefault();ss({profile:'${d.n.replace(/'/g,"\\'")}'})">${d.n}</a></td>
      <td><span class="pl pl-r">${trunc(d.r||'',20)}</span></td>
      <td><span class="pl pl-i">${d.inc||''}</span></td>
      <td>${sbar(d.ov)}</td><td>${sbar(d.p1,P_COLOR[1])}</td>
      <td>${sbar(d.p2,P_COLOR[2])}</td><td>${sbar(d.p3,P_COLOR[3])}</td>
    </tr>`;
  });
  h+=`</tbody></table></div></div>`;

  return h;
}

function iProfile(){
  const eco=DATA.find(d=>d.n===S.profile);
  if(!eco) return;
  const catVals=CAT_KEYS.map(i=>eco[`c${i}`]||0);
  const globalMean=CAT_KEYS.map(i=>avg(DATA.map(d=>d[`c${i}`]).filter(v=>v!=null)));
  const catLabels=CATS_META.map(c=>trunc(c.replace(/^\d+\.\d+\. /,''),20));
  CH.profRadar=new Chart(document.getElementById('ch_profRadar'),{
    type:'radar',
    data:{labels:catLabels,datasets:[
      {label:eco.n,data:catVals,backgroundColor:'rgba(30,64,175,.12)',borderColor:'rgba(30,64,175,.85)',pointBackgroundColor:'#1E40AF',pointRadius:4,borderWidth:2},
      {label:'Global Mean',data:globalMean,backgroundColor:'rgba(180,83,9,.08)',borderColor:'rgba(180,83,9,.6)',borderDash:[4,4],pointRadius:2,pointBackgroundColor:'#B45309',borderWidth:1.5}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#64748B',font:{size:10}}}},
      scales:{r:{beginAtZero:true,grid:GRID,angleLines:GRID,pointLabels:{color:'#64748B',font:{size:8}},ticks:{display:false}}}}
  });
}

// ══════════════════════════════════════════
// COMPARE
// ══════════════════════════════════════════
function rCompare(){
  const allSorted=DATA.slice().sort((a,b)=>a.n.localeCompare(b.n));
  let h=`<div class="esel">`;
  for(let i=0;i<4;i++){
    const sel=S.compare[i]||'';
    h+=`<div class="fg"><label>Economy ${i+1}</label>
      <select onchange="uc(${i},this.value)">
        <option value="">— None —</option>
        ${allSorted.map(d=>`<option ${sel===d.n?'selected':''}>${d.n}</option>`).join('')}
      </select>
    </div>`;
  }
  h+=`</div>`;

  const ecos=S.compare.map(n=>DATA.find(d=>d.n===n)).filter(Boolean);
  if(ecos.length<2){h+=`<p style="color:var(--text3)">Select at least 2 economies to compare.</p>`;return h}

  h+=`<div class="g2">
    <div class="cb"><h3>Category Radar Comparison</h3><div class="cw"><canvas id="ch_compRadar"></canvas></div></div>
    <div class="cb"><h3>Pillar Score Comparison</h3><div class="cw"><canvas id="ch_compPillar"></canvas></div></div>
  </div>`;

  h+=`<div class="cpanel">`;
  ecos.forEach(eco=>{
    h+=`<div class="ccard"><h3>${eco.n}</h3><div class="cm">${trunc(eco.r||'',25)} · ${eco.inc||''}</div>`;
    h+=`<div class="crow"><span class="rl">Overall</span><span class="rv" style="color:${scolor(eco.ov||0)}">${fmt1(eco.ov)}</span></div>`;
    [{k:'p1',l:'Pillar 1',c:'var(--p1)'},{k:'p2',l:'Pillar 2',c:'var(--p2)'},{k:'p3',l:'Pillar 3',c:'var(--p3)'}].forEach(p=>{
      h+=`<div class="crow"><span class="rl">${p.l}</span><span class="rv" style="color:${p.c}">${fmt1(eco[p.k])}</span></div>`;
    });
    CAT_KEYS.forEach(i=>{
      h+=`<div class="crow"><span class="rl">${trunc(CATS_META[i].replace(/^\d+\.\d+\. /,''),28)}</span><span class="rv" style="color:${P_COLOR[CAT_PILLAR[i]]}">${fmt1(eco[`c${i}`])}</span></div>`;
    });
    h+=`</div>`;
  });
  h+=`</div>`;
  return h;
}

function iCompare(){
  const el1=document.getElementById('ch_compRadar');
  const el2=document.getElementById('ch_compPillar');
  if(!el1||!el2) return;
  const ecos=S.compare.map(n=>DATA.find(d=>d.n===n)).filter(Boolean);
  if(ecos.length<2) return;
  const colors=['#1E40AF','#047857','#B45309','#C2410C'];
  const catLabels=CATS_META.map(c=>trunc(c.replace(/^\d+\.\d+\. /,''),20));

  // Radar
  CH.compRadar=new Chart(el1,{
    type:'radar',
    data:{labels:catLabels,datasets:ecos.map((e,i)=>({
      label:e.n,
      data:CAT_KEYS.map(ci=>e[`c${ci}`]||0),
      backgroundColor:colors[i]+'22',borderColor:colors[i],
      pointBackgroundColor:colors[i],pointRadius:3,borderWidth:2
    }))},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#64748B',font:{size:10}},position:'bottom'}},
      scales:{r:{beginAtZero:true,grid:GRID,angleLines:GRID,pointLabels:{color:'#64748B',font:{size:8}},ticks:{display:false}}}}
  });

  // Grouped bar (overall + 3 pillars)
  CH.compPillar=new Chart(el2,{
    type:'bar',
    data:{
      labels:['Overall','Pillar 1','Pillar 2','Pillar 3'],
      datasets:ecos.map((e,i)=>({
        label:e.n,
        data:[e.ov,e.p1,e.p2,e.p3],
        backgroundColor:colors[i]+'BB',borderColor:colors[i],
        borderWidth:1,borderRadius:4
      }))
    },
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#64748B',font:{size:10}},position:'bottom'}},
      scales:{x:{grid:{display:false},ticks:TICK},y:{max:100,grid:GRID,ticks:TICK}}}
  });
}

// ══════════════════════════════════════════
// SCATTER
// ══════════════════════════════════════════
function rScatter(f){
  const optH=SCATTER_OPTS.map(o=>`<option value="${o.k}" ${S.scX===o.k?'selected':''}>${o.l}</option>`).join('');
  const optY=SCATTER_OPTS.map(o=>`<option value="${o.k}" ${S.scY===o.k?'selected':''}>${o.l}</option>`).join('');
  let h=`<div class="frow" style="margin-bottom:14px">
    <div class="fg"><label>X Axis</label><select onchange="ss({scX:this.value})">${optH}</select></div>
    <div class="fg"><label>Y Axis</label><select onchange="ss({scY:this.value})">${optY}</select></div>
  </div>`;
  const xLab=SCATTER_OPTS.find(o=>o.k===S.scX)?.l||S.scX;
  const yLab=SCATTER_OPTS.find(o=>o.k===S.scY)?.l||S.scY;
  h+=`<div class="cb"><h3>${xLab} vs ${yLab}</h3><div class="cw xtall"><canvas id="ch_scatter"></canvas></div></div>`;
  return h;
}

function iScatter(f){
  const el=document.getElementById('ch_scatter');
  if(!el) return;
  const regsP=REGIONS_ALL.filter(r=>f.some(d=>d.r===r));
  const xLab=SCATTER_OPTS.find(o=>o.k===S.scX)?.l||S.scX;
  const yLab=SCATTER_OPTS.find(o=>o.k===S.scY)?.l||S.scY;
  CH.scatter=new Chart(el,{
    type:'scatter',
    data:{datasets:regsP.map((r,ri)=>{
      const pts=f.filter(d=>d.r===r).map(d=>({x:d[S.scX]||0,y:d[S.scY]||0,label:d.n}));
      return{label:trunc(r,20),data:pts,backgroundColor:PALETTE7[ri%7]+'AA',borderColor:PALETTE7[ri%7],pointRadius:5,pointHoverRadius:8};
    })},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#64748B',font:{size:10}},position:'bottom'},
        tooltip:{callbacks:{label:ctx=>`${ctx.raw.label}: (${fmt1(ctx.raw.x)}, ${fmt1(ctx.raw.y)})`}}},
      scales:{x:{title:{display:true,text:xLab,color:'#64748B'},grid:GRID,ticks:TICK},y:{title:{display:true,text:yLab,color:'#64748B'},grid:GRID,ticks:TICK}}}
  });
}

// ══════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════
function ss(p){Object.assign(S,p);render()}
function tsort(c){if(S.sortCol===c)S.sortDir=S.sortDir==='desc'?'asc':'desc';else{S.sortCol=c;S.sortDir='desc'}render()}
function uc(i,v){const a=[...S.compare];a[i]=v;S.compare=a;render()}

render();
</script>
</body>
</html>
